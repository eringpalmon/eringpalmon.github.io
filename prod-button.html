<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productivity GO</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0c0c10;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;
  overflow-y:auto;overflow-x:hidden;
  font-family:'Nunito',sans-serif;color:#e0e0e8;
  padding:24px 16px 40px;
  transition:background .4s;
}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.scene{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;gap:0;
  width:100%;max-width:480px;
}

/* ── tower window ── */
.city-window{
  width:100%;border-radius:10px 10px 0 0;overflow:hidden;
  border:2px solid #2e2e42;border-bottom:none;
  opacity:0;transition:opacity 0.8s ease;
}
.city-window.on{opacity:1;}
.window-bar{
  background:#22223a;padding:6px 12px;
  display:flex;align-items:center;gap:7px;
  border-bottom:1px solid #2e2e42;
}
.dot{width:10px;height:10px;border-radius:50%;}
.dot-r{background:#e24b4a;}.dot-y{background:#f0c040;}.dot-g{background:#3a9e5a;}
.win-title{
  flex:1;text-align:center;font-size:10px;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;color:#404060;
  margin-right:34px;
}
.win-timer{
  font-family:'Boogaloo',cursive;font-size:15px;letter-spacing:.06em;
  color:#7070a0;transition:color .3s;margin-right:4px;min-width:52px;text-align:right;
}
.win-timer.active{color:#c0c0f0;}
.win-timer.paused{color:#505070;}

#tower-canvas{display:block;width:100%;height:200px;image-rendering:pixelated;}

/* ── button ── */
.btn-stage{position:relative;width:210px;height:210px;display:flex;align-items:center;justify-content:center;margin-top:-8px;}
.ring{position:absolute;border-radius:50%;border:2.5px solid transparent;pointer-events:none;opacity:0;transition:border-color .4s,opacity .4s;}
#r1{inset:-14px;}
#r2{inset:-28px;border-width:1.5px;}

@keyframes rp {0%,100%{opacity:.55;transform:scale(1)}50%{opacity:1;transform:scale(1.07)}}
@keyframes rp2{0%,100%{opacity:.18;transform:scale(1)}50%{opacity:.5;transform:scale(1.12)}}
@keyframes bs{0%,100%{transform:scale(1)}50%{transform:scale(1.042)}}
@keyframes bm{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes bf{0%,100%{transform:scale(1)}40%{transform:scale(1.10)}55%{transform:scale(1.13)}}

.ps #r1{animation:rp  2.5s ease-in-out infinite;opacity:.55;}
.ps #r2{animation:rp2 2.5s ease-in-out infinite .7s;opacity:.18;}
.ps #btn{animation:bs 2.5s ease-in-out infinite;}
.pm #r1{animation:rp  1.4s ease-in-out infinite;opacity:.65;}
.pm #r2{animation:rp2 1.4s ease-in-out infinite .35s;opacity:.28;}
.pm #btn{animation:bm 1.4s ease-in-out infinite;}
.pf #r1{animation:rp  .68s ease-in-out infinite;opacity:.85;}
.pf #r2{animation:rp2 .68s ease-in-out infinite .17s;opacity:.4;}
.pf #btn{animation:bf .68s ease-in-out infinite;}

#btn{
  width:190px;height:190px;border-radius:50%;border:none;cursor:pointer;
  font-family:'Boogaloo',cursive;font-size:2.4rem;letter-spacing:.07em;
  color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.5);
  background:#e24b4a;z-index:3;
  transition:background .4s,box-shadow .4s,transform .1s;
  outline:none;user-select:none;-webkit-tap-highlight-color:transparent;
  box-shadow:0 6px 38px rgba(226,75,74,.5);
}
#btn:hover{transform:scale(1.035)!important;}
#btn:active{transform:scale(.93)!important;}
#btn.locked{cursor:not-allowed;filter:grayscale(.7);}
#btn.locked:hover{transform:none!important;}
#btn.locked:active{transform:none!important;}

/* ── controls panel ── */
.controls{margin-top:16px;display:flex;flex-direction:column;align-items:center;gap:11px;width:100%;}
.ctrl-row{display:flex;justify-content:space-between;align-items:center;width:100%;}
.lbl{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#505060;}
.val-badge{font-size:13px;font-weight:900;transition:color .3s;}

input[type=range]{
  -webkit-appearance:none;appearance:none;
  width:100%;height:5px;border-radius:3px;
  background:#1e1e28;outline:none;cursor:pointer;transition:background .3s;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:20px;height:20px;border-radius:50%;
  background:#e24b4a;border:3px solid #0c0c10;
  cursor:pointer;transition:background .3s,transform .15s;
}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.2);}
.ticks{display:flex;justify-content:space-between;width:100%;}
.ticks span{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#333344;}

.settings-toggle{
  width:100%;display:flex;align-items:center;gap:10px;cursor:pointer;
  background:none;border:none;padding:4px 0;user-select:none;
}
.settings-toggle:hover .toggle-line{background:#383850;}
.toggle-line{flex:1;height:1px;background:#22223a;transition:background .2s;}
.toggle-label{
  display:flex;align-items:center;gap:6px;
  font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
  color:#404055;transition:color .2s,border-color .2s;white-space:nowrap;
  border:1.5px solid #2a2a3e;border-radius:6px;padding:5px 12px;
}
.settings-toggle:hover .toggle-label{color:#606080;border-color:#44445a;}
.toggle-arrow{font-size:10px;transition:transform .3s ease;display:inline-block;line-height:1;}
.toggle-arrow.open{transform:rotate(180deg);}
.settings-body{
  width:100%;overflow:hidden;max-height:0;
  transition:max-height .35s ease, opacity .3s ease;opacity:0;
}
.settings-body.open{max-height:400px;opacity:1;}

.settings-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;}
.setting-block{display:flex;flex-direction:column;gap:6px;}
.setting-top{display:flex;justify-content:space-between;align-items:baseline;}

.swatch-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.swatch{
  width:20px;height:20px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:transform .15s,border-color .15s;flex-shrink:0;
}
.swatch:hover{transform:scale(1.2);}
.swatch.active{border-color:#fff;}

.bottom-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;}
.card{
  background:#13131e;border:1px solid #22223a;border-radius:10px;
  padding:10px 14px;display:flex;flex-direction:column;gap:7px;
}
.card-top{display:flex;justify-content:space-between;align-items:baseline;}
.card-lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#505060;}
.card-val{font-size:18px;font-weight:900;transition:color .4s;color:#444458;font-family:'Boogaloo',cursive;letter-spacing:.05em;}
.gauge-track{width:100%;height:6px;background:#1a1a26;border-radius:3px;overflow:hidden;}
.gauge-fill{height:100%;width:0%;border-radius:3px;transition:width .5s ease,background .5s ease;background:#eeeef4;}
.card-btn{
  align-self:flex-end;background:none;border:1px solid #2a2a3a;border-radius:6px;
  color:#505060;font-family:'Nunito',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;cursor:pointer;
  white-space:nowrap;transition:border-color .2s,color .2s,background .2s;margin-top:2px;
}
.card-btn:hover{border-color:#444;color:#e0e0e8;background:#1a1a26;}

.timer-val{font-size:22px;font-weight:900;font-family:'Boogaloo',cursive;letter-spacing:.08em;color:#444458;transition:color .4s;}
.timer-val.active{color:#c0d0ff;}
.timer-val.paused{color:#505070;}

.hint{margin-top:10px;font-size:11px;color:#404050;letter-spacing:.1em;text-transform:uppercase;font-weight:700;text-align:center;}
.max-msg{
  margin-top:8px;font-size:12px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;
  color:#e24b4a;text-align:center;display:none;
}
@keyframes flash-msg{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="scene">

  <!-- tower window -->
  <div class="city-window" id="city-window">
    <div class="window-bar">
      <div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>
      <span class="win-title">Tower View</span>
      <span class="win-timer" id="win-timer">0:00</span>
    </div>
    <canvas id="tower-canvas" width="480" height="200"></canvas>
  </div>

  <!-- button -->
  <div class="btn-stage" id="stage">
    <div class="ring" id="r1"></div>
    <div class="ring" id="r2"></div>
    <button id="btn">START</button>
  </div>

  <!-- controls -->
  <div class="controls">
    <div style="width:100%;display:flex;flex-direction:column;gap:6px;">
      <div class="ctrl-row">
        <span class="lbl">Motivation Intensity</span>
        <span class="val-badge" id="vibe">Gentle nudge</span>
      </div>
      <input type="range" id="slider-intensity" min="1" max="5" step="1" value="1">
      <div class="ticks">
        <span>Soft</span><span>Mild</span><span>Medium</span><span>Fired</span><span>CHAOS</span>
      </div>
    </div>

    <div class="bottom-row">
      <div class="card">
        <div class="card-top">
          <span class="card-lbl">Pauses</span>
          <span class="card-val" id="pause-count">0 / 2</span>
        </div>
        <div class="gauge-track"><div class="gauge-fill" id="gauge-fill"></div></div>
        <button class="card-btn" id="reset-pauses">Reset pauses</button>
      </div>
      <div class="card">
        <div class="card-top"><span class="card-lbl">Focus time</span></div>
        <div class="timer-val" id="timer-val">0:00</div>
        <button class="card-btn" id="reset-timer">Reset timer</button>
      </div>
    </div>

    <button class="settings-toggle" id="settings-toggle" aria-expanded="false">
      <div class="toggle-line"></div>
      <span class="toggle-label">
        <span>Settings</span>
        <span class="toggle-arrow" id="toggle-arrow">▾</span>
      </span>
      <div class="toggle-line"></div>
    </button>

    <div class="settings-body" id="settings-body">
      <div style="display:flex;flex-direction:column;gap:11px;padding-top:4px;">
        <div class="settings-row">
          <div class="setting-block">
            <div class="setting-top">
              <span class="lbl">Max pauses</span>
              <span class="val-badge" id="max-pause-val" style="color:#888">2</span>
            </div>
            <input type="range" id="slider-maxpause" min="1" max="10" step="1" value="2" style="background:#1e1e28;">
          </div>
          <div class="setting-block">
            <span class="lbl" style="margin-bottom:6px;">App background</span>
            <div style="display:flex;flex-direction:column;gap:6px;">
              <div style="display:flex;align-items:center;gap:5px;">
                <span style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#404055;width:32px;">Dark</span>
                <div class="swatch-row" id="swatch-row">
                  <div class="swatch active" data-color="#0c0c10" style="background:#0c0c10;outline:1px solid #444;"></div>
                  <div class="swatch" data-color="#0a0f1a" style="background:#0a0f1a;outline:1px solid #2a3a5a;"></div>
                  <div class="swatch" data-color="#100a1a" style="background:#100a1a;outline:1px solid #3a2a4a;"></div>
                  <div class="swatch" data-color="#0a1a0e" style="background:#0a1a0e;outline:1px solid #1a3a22;"></div>
                  <div class="swatch" data-color="#1a0a08" style="background:#1a0a08;outline:1px solid #3a1a14;"></div>
                  <div class="swatch" data-color="#001616" style="background:#001616;outline:1px solid #003a3a;"></div>
                  <div class="swatch" data-color="#141414" style="background:#141414;outline:1px solid #383838;"></div>
                </div>
              </div>
              <div style="display:flex;align-items:center;gap:5px;">
                <span style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#404055;width:32px;">Light</span>
                <div class="swatch-row" id="swatch-row-light">
                  <div class="swatch" data-color="#f5f5f0" style="background:#f5f5f0;outline:1px solid #ccc;"></div>
                  <div class="swatch" data-color="#eef2f8" style="background:#eef2f8;outline:1px solid #bbc;"></div>
                  <div class="swatch" data-color="#f0eef8" style="background:#f0eef8;outline:1px solid #c8c0e0;"></div>
                  <div class="swatch" data-color="#eef5ee" style="background:#eef5ee;outline:1px solid #b0d0b0;"></div>
                  <div class="swatch" data-color="#fdf0e8" style="background:#fdf0e8;outline:1px solid #ddc0a0;"></div>
                  <div class="swatch" data-color="#e8f5f5" style="background:#e8f5f5;outline:1px solid #a0c8c8;"></div>
                  <div class="swatch" data-color="#f8f8f8" style="background:#f8f8f8;outline:1px solid #ccc;"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <p class="hint" id="hint">click to start &nbsp;·&nbsp; double-click to pause</p>
  <p class="max-msg" id="max-msg"></p>
</div>

<script>
// ── stars ──
(()=>{
  const c=document.getElementById('stars'),x=c.getContext('2d');
  c.width=window.innerWidth;c.height=window.innerHeight;
  for(let i=0;i<200;i++){
    const px=Math.random()*c.width,py=Math.random()*c.height,r=Math.random()*1.3;
    x.beginPath();x.arc(px,py,r,0,Math.PI*2);
    x.fillStyle=`rgba(255,255,255,${.08+Math.random()*.35})`;x.fill();
  }
})();

// ── app state ──
const COLORS=['#e24b4a','#d85a30','#ba7517','#5a9620','#1a9e72','#1660a8','#7a70de','#cc4e80','#2e8a5a','#0a447e','#8b3fc0','#a8602a'];
const VIBES=['Gentle nudge','Getting real','Fired up','Full send','CHAOS MODE'];

let running=false, paused=false, colorIdx=0, intensity=1, clickTimer=null;
let pauseCount=0, maxPauses=2;

// timer
let timerSec=0, timerInterval=null;

const btn          = document.getElementById('btn');
const stage        = document.getElementById('stage');
const r1           = document.getElementById('r1');
const r2           = document.getElementById('r2');
const sliderInt    = document.getElementById('slider-intensity');
const sliderMax    = document.getElementById('slider-maxpause');
const vibeEl       = document.getElementById('vibe');
const hint         = document.getElementById('hint');
const maxMsg       = document.getElementById('max-msg');
const cityWindow   = document.getElementById('city-window');
const pauseCountEl = document.getElementById('pause-count');
const gaugeFill    = document.getElementById('gauge-fill');
const resetPauses  = document.getElementById('reset-pauses');
const resetTimer   = document.getElementById('reset-timer');
const timerVal     = document.getElementById('timer-val');
const winTimer     = document.getElementById('win-timer');
const maxPauseVal  = document.getElementById('max-pause-val');

// ── color helpers ──
function col(){ return COLORS[colorIdx % COLORS.length]; }

function applyColor(c){
  btn.style.background=c;
  btn.style.boxShadow=`0 6px 38px ${c}77`;
  r1.style.borderColor=c+'bb';
  r2.style.borderColor=c+'55';
  vibeEl.style.color=c;
  const pct=((intensity-1)/4*100).toFixed(0);
  sliderInt.style.background=`linear-gradient(to right,${c} 0%,${c} ${pct}%,#1e1e28 ${pct}%,#1e1e28 100%)`;
  let st=document.getElementById('_th');
  if(!st){st=document.createElement('style');st.id='_th';document.head.appendChild(st);}
  st.textContent=`input[type=range]::-webkit-slider-thumb{background:${c}!important;}`;
}

function setPulse(){
  stage.className='btn-stage';
  if(!running) return;
  if(intensity<=2) stage.classList.add('ps');
  else if(intensity<=4) stage.classList.add('pm');
  else stage.classList.add('pf');
}

// ── timer ──
function fmtTime(s){
  const m=Math.floor(s/60), ss=s%60;
  return `${m}:${ss.toString().padStart(2,'0')}`;
}
function startTimer(){
  if(timerInterval) return;
  timerInterval=setInterval(()=>{
    timerSec++;
    const f=fmtTime(timerSec);
    timerVal.textContent=f;
    winTimer.textContent=f;
  },1000);
  timerVal.className='timer-val active';
  winTimer.className='win-timer active';
}
function pauseTimer(){
  clearInterval(timerInterval); timerInterval=null;
  timerVal.className='timer-val paused';
  winTimer.className='win-timer paused';
}
function resetTimerFn(){
  pauseTimer();
  timerSec=0;
  timerVal.textContent='0:00';
  winTimer.textContent='0:00';
  timerVal.className='timer-val';
  winTimer.className='win-timer';
}

// ── gauge ──
function updateGauge(){
  const t=Math.min(pauseCount/maxPauses,1);
  gaugeFill.style.width=(t*100)+'%';
  pauseCountEl.textContent=`${pauseCount} / ${maxPauses}`;
  let r,g,b;
  if(t<.5){const s=t*2;r=Math.round(238+s*(210-238));g=Math.round(238+s*(90-238));b=Math.round(238+s*(50-238));}
  else{const s=(t-.5)*2;r=Math.round(210+s*(60-210));g=Math.round(90+s*(10-90));b=Math.round(50+s*(10-50));}
  const c=`rgb(${r},${g},${b})`;
  gaugeFill.style.background=c;
  pauseCountEl.style.color=t<.05?'#444458':c;

  if(pauseCount>=maxPauses){
    btn.classList.add('locked');
    btn.style.background='#3a3a4a';
    btn.style.boxShadow='0 6px 38px rgba(0,0,0,.3)';
    btn.textContent='LOCKED';
    stage.className='btn-stage';
    hint.textContent='';
    maxMsg.textContent='max pauses reached — reset to continue';
    maxMsg.style.display='block';
    maxMsg.style.animation='none';
    maxMsg.offsetHeight;
    maxMsg.style.animation='flash-msg 1s ease-in-out 3';
  }
}

// ── main actions ──
function goRunning(){
  if(pauseCount>=maxPauses) return;
  running=true; paused=false;
  colorIdx++;
  applyColor(col());
  setPulse();
  btn.textContent='STARTING';
  hint.textContent='click to change color · double-click to pause';
  cityWindow.classList.add('on');
  towerState.paused=false;
  startTower();
  startTimer();
  setTimeout(()=>{ if(running) btn.textContent='GO!'; },700);
}

function goPause(){
  running=false; paused=true;
  pauseCount=Math.min(pauseCount+1,maxPauses);
  updateGauge();
  towerState.paused=true;
  pauseTimer();
  stage.className='btn-stage';
  if(pauseCount>=maxPauses){ stopTower(); cityWindow.classList.remove('on'); return; }
  btn.style.background='#e24b4a';
  btn.style.boxShadow='0 6px 38px rgba(226,75,74,.5)';
  r1.style.borderColor='#e24b4abb';
  r2.style.borderColor='#e24b4a44';
  btn.textContent='PAUSE';
  hint.textContent='paused · click to go again';
  setTimeout(()=>{ if(!running&&pauseCount<maxPauses) btn.textContent='START'; },1300);
}

function unlockBtn(){
  btn.classList.remove('locked');
  btn.textContent='START';
  btn.style.background='#e24b4a';
  btn.style.boxShadow='0 6px 38px rgba(226,75,74,.5)';
  r1.style.borderColor='#e24b4abb';
  r2.style.borderColor='#e24b4a44';
  maxMsg.style.display='none';
  hint.textContent='click to start · double-click to pause';
}

btn.addEventListener('click',()=>{
  if(btn.classList.contains('locked')) return;
  if(clickTimer!==null){
    clearTimeout(clickTimer); clickTimer=null;
    goPause();
  } else {
    clickTimer=setTimeout(()=>{ clickTimer=null; goRunning(); },300);
  }
});

sliderInt.addEventListener('input',()=>{
  intensity=parseInt(sliderInt.value);
  vibeEl.textContent=VIBES[intensity-1];
  applyColor(running?col():'#e24b4a');
  if(running) setPulse();
});

sliderMax.addEventListener('input',()=>{
  maxPauses=parseInt(sliderMax.value);
  maxPauseVal.textContent=maxPauses;
  const pct=((maxPauses-1)/9*100).toFixed(0);
  sliderMax.style.background=`linear-gradient(to right,#6060a0 0%,#6060a0 ${pct}%,#1e1e28 ${pct}%,#1e1e28 100%)`;
  updateGauge();
  if(pauseCount<maxPauses && btn.classList.contains('locked')) unlockBtn();
});

const settingsToggle=document.getElementById('settings-toggle');
const settingsBody=document.getElementById('settings-body');
const toggleArrow=document.getElementById('toggle-arrow');
settingsToggle.addEventListener('click',()=>{
  const open=settingsBody.classList.toggle('open');
  toggleArrow.classList.toggle('open',open);
  settingsToggle.setAttribute('aria-expanded',open);
});

const allSwatches=document.querySelectorAll('.swatch');
allSwatches.forEach(s=>{
  s.addEventListener('click',()=>{
    allSwatches.forEach(x=>x.classList.remove('active'));
    s.classList.add('active');
    document.body.style.background=s.dataset.color;
    document.getElementById('stars').style.opacity=
      s.dataset.color.startsWith('#f')||s.dataset.color.startsWith('#e') ? '0.15' : '1';
  });
});

resetPauses.addEventListener('click',()=>{
  pauseCount=0; updateGauge();
  if(btn.classList.contains('locked')) unlockBtn();
});
resetTimer.addEventListener('click',()=>{
  resetTimerFn();
  // also reset the tower scene
  running=false; paused=false;
  stage.className='btn-stage';
  cityWindow.classList.remove('on');
  resetTower();
  towerState.paused=true;
  btn.classList.remove('locked');
  btn.textContent='START';
  btn.style.background='#e24b4a';
  btn.style.boxShadow='0 6px 38px rgba(226,75,74,.5)';
  r1.style.borderColor='#e24b4abb';
  r2.style.borderColor='#e24b4a44';
  maxMsg.style.display='none';
  hint.textContent='click to start · double-click to pause';
});

applyColor('#e24b4a');
updateGauge();
sliderMax.style.background='linear-gradient(to right,#6060a0 0%,#6060a0 11%,#1e1e28 11%,#1e1e28 100%)';

// ══════════════════════════════════════════════════
// ── TOWER ANIMATION ──
// ══════════════════════════════════════════════════
const towerCanvas = document.getElementById('tower-canvas');
const tc = towerCanvas.getContext('2d');

// Floor build time in seconds per intensity level
// intensity 1=60s, 2=30s, 3=15s, 4=8s, 5=4s
const FLOOR_TIMES = [60, 30, 15, 8, 4];

// Worker walk speed px/frame (60fps) per intensity
const WORKER_SPEEDS = [0.4, 0.9, 1.8, 3.0, 5.0];

// How many workers per intensity
const WORKER_COUNTS = [1, 1, 2, 2, 3];

// Build color palette for a floor derived from the current button color
function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return [r,g,b];
}
function rgbToHex(r,g,b){
  return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');
}
function makeFloorPal(floorIdx){
  const [r,g,b] = hexToRgb(col());
  // alternate slight hue shifts per floor for variety
  const shift = (floorIdx % 3) * 15 - 15;
  const wall = rgbToHex(r*0.55+shift, g*0.55+shift, b*0.55+shift);
  const roof = rgbToHex(r*0.40, g*0.40, b*0.40);
  const frame = rgbToHex(r*0.28, g*0.28, b*0.28);
  // window: lighter tint of accent
  const win = rgbToHex(r*0.6+100, g*0.6+100, b*0.6+100);
  return {wall, window:win, frame, roof};
}

// Floor visual params
const FLOOR_H = 18; // px height of each floor
const FLOOR_W_RATIO = 0.65; // floor width as ratio of canvas
const GROUND_H = 24;

// Building color palettes per floor (cycles)
const FLOOR_PALETTES = [
  {wall:'#3a5a8a', window:'#8ec4e8', frame:'#2a3a5a', roof:'#2a4a7a'},
  {wall:'#5a3a8a', window:'#c8a8e8', frame:'#3a2a5a', roof:'#4a2a7a'},
  {wall:'#3a8a5a', window:'#8ae8b0', frame:'#2a5a3a', roof:'#2a6a4a'},
  {wall:'#8a6a3a', window:'#e8c87a', frame:'#5a4a2a', roof:'#6a5a2a'},
  {wall:'#8a3a3a', window:'#e89090', frame:'#5a2a2a', roof:'#6a2a2a'},
  {wall:'#3a7a8a', window:'#80d8e8', frame:'#2a4a5a', roof:'#2a5a6a'},
];

// Tower state
const towerState = {
  floors: [],          // completed floors
  currentFloor: 0,     // floor index being built (0=ground floor)
  buildProgress: 0,    // 0..1 progress on current floor
  paused: false,
  rafId: null,
  prevT: null,
  scrollOffset: 0,     // how many px to shift down (camera follows top)
  workers: [],
  coffeeBreak: false,
};

function initWorkers(){
  const n = WORKER_COUNTS[intensity-1];
  towerState.workers = [];
  const CW = towerCanvas.width;
  const floorW = Math.floor(CW * FLOOR_W_RATIO);
  const startX = Math.floor((CW - floorW)/2);
  for(let i=0;i<n;i++){
    towerState.workers.push({
      x: startX + Math.random()*floorW,
      dir: Math.random()<0.5?1:-1,
      frame: 0,
      frameTimer: 0,
      color: ['#f5c9a0','#d4a070','#c08858'][i%3],
      shirtColor: ['#3a6ee0','#e06030','#30a060'][i%3],
      hammerPhase: Math.random()*Math.PI*2,
      // for coffee break
      coffeeSeatX: 0,
      coffeeSeatSet: false,
    });
  }
}

function resetTower(){
  towerState.floors = [];
  towerState.currentFloor = 0;
  towerState.buildProgress = 0;
  towerState.scrollOffset = 0;
  towerState.coffeeBreak = false;
  initWorkers();
}


function drawFloor(x, y, w, h, pal, pct){
  const visW = Math.floor(w * pct);
  if(visW<=0) return;
  // wall body
  tc.fillStyle = pal.wall;
  tc.fillRect(x, y, visW, h);
  // windows (2 per floor if wide enough, drawn as they reveal)
  const winW = 6, winH = 8;
  const winY = y + (h - winH)/2;
  const positions = [x + w*0.25 - winW/2, x + w*0.65 - winW/2];
  for(const wx of positions){
    if(wx + winW <= x + visW){
      tc.fillStyle = pal.frame;
      tc.fillRect(wx-1, winY-1, winW+2, winH+2);
      tc.fillStyle = pal.window;
      tc.fillRect(wx, winY, winW, winH);
      // window cross
      tc.fillStyle = pal.frame;
      tc.fillRect(wx + winW/2-0.5, winY, 1, winH);
      tc.fillRect(wx, winY + winH/2-0.5, winW, 1);
      // lit window glow (small chance)
      if((x+y+wx)%7===0){
        tc.fillStyle='rgba(255,240,120,0.4)';
        tc.fillRect(wx+1, winY+1, winW-2, winH/2-1);
      }
    }
  }
  // top edge highlight
  tc.fillStyle = pal.roof;
  tc.fillRect(x, y, visW, 2);
  // left shadow
  tc.fillStyle = 'rgba(0,0,0,0.2)';
  tc.fillRect(x, y, 2, h);
}

function drawGround(CW, CH){
  const y = CH - GROUND_H;
  // ground platform
  tc.fillStyle = '#22223a';
  tc.fillRect(0, y, CW, GROUND_H);
  // ground top edge
  tc.fillStyle = '#33334a';
  tc.fillRect(0, y, CW, 2);
  // subtle grid lines
  tc.strokeStyle = 'rgba(255,255,255,0.04)';
  tc.lineWidth = 1;
  for(let gx=0;gx<CW;gx+=16){
    tc.beginPath();tc.moveTo(gx,y);tc.lineTo(gx,CH);tc.stroke();
  }
}

function drawSky(CW, CH){
  // gradient sky
  const grad = tc.createLinearGradient(0,0,0,CH);
  grad.addColorStop(0,'#0c0c18');
  grad.addColorStop(1,'#13132a');
  tc.fillStyle = grad;
  tc.fillRect(0,0,CW,CH);

  // stars (static, seeded by position)
  tc.fillStyle = 'rgba(255,255,255,0.5)';
  for(let i=0;i<40;i++){
    const sx = ((i*137+23)%CW);
    const sy = ((i*91+17)%(CH*0.7));
    const sr = i%5===0?1.2:0.6;
    tc.beginPath();tc.arc(sx,sy,sr,0,Math.PI*2);tc.fill();
  }
}

// Pixel worker: draws a small pixel-art person
function drawWorker(w, canvasX, y, t, coffeeBreak){
  const S = 2; // pixel scale
  const px = Math.round(canvasX);
  const py = Math.round(y);
  const dir = w.dir;
  const speed = WORKER_SPEEDS[intensity-1];
  const walkFrame = coffeeBreak ? 0 : Math.floor(t * speed * 0.04) % 4;

  // shadow
  tc.fillStyle = 'rgba(0,0,0,0.3)';
  tc.fillRect(px-5, py+16*S-2, 10, 2);

  // body
  // legs (animate walk)
  const legOffsets = coffeeBreak
    ? [[0,0],[0,0]]
    : [[0,2,1,4],[1,0,2,2],[0,2,1,4],[2,0,1,2]][walkFrame] !== undefined
      ? [[[-1*dir,0],[1*dir,2]],[[1*dir,0],[-1*dir,2]],[[-1*dir,0],[1*dir,4]],[[1*dir,0],[-1*dir,4]]][walkFrame]
      : [[-1,0],[1,2]];

  if(coffeeBreak){
    // sitting: legs forward
    tc.fillStyle = '#1a1a2e';
    tc.fillRect(px-3*S, py+8*S, 2*S, 3*S); // left leg horiz
    tc.fillRect(px+1*S, py+8*S, 2*S, 3*S); // right leg horiz
    tc.fillRect(px-3*S, py+11*S, 2*S, 2*S); // feet
    tc.fillRect(px+1*S, py+11*S, 2*S, 2*S);
  } else {
    const lo = legOffsets[0], lo2 = legOffsets[1];
    tc.fillStyle = '#1a1a2e';
    tc.fillRect(px + lo[0]*S, py+8*S, 2*S, 5*S+lo[1]);
    tc.fillRect(px + lo2[0]*S, py+8*S, 2*S, 5*S+lo2[1]);
    // shoes
    tc.fillStyle = '#111';
    tc.fillRect(px + lo[0]*S - S, py+12*S+lo[1], 3*S, S);
    tc.fillRect(px + lo2[0]*S - S, py+12*S+lo2[1], 3*S, S);
  }

  // torso
  tc.fillStyle = w.shirtColor;
  tc.fillRect(px-2*S, py+4*S, 4*S, 5*S);

  // helmet / hard hat
  tc.fillStyle = '#f0c040';
  tc.fillRect(px-3*S, py+1*S, 6*S, 2*S);
  tc.fillRect(px-2*S, py-S, 4*S, 2*S);

  // head
  tc.fillStyle = w.color;
  tc.fillRect(px-2*S, py+1*S, 4*S, 3*S);

  // eyes
  tc.fillStyle = '#222';
  if(dir>=0){
    tc.fillRect(px+S, py+2*S, S, S);
  } else {
    tc.fillRect(px-2*S, py+2*S, S, S);
  }

  // arm + hammer (only when not on coffee break)
  if(!coffeeBreak){
    const hamAng = Math.sin(t * speed * 0.12 + w.hammerPhase);
    const hamX = dir>0 ? px+2*S : px-3*S;
    const hamY = py+4*S + Math.round(hamAng*2*S);
    // arm
    tc.fillStyle = w.color;
    tc.fillRect(hamX, hamY, S, 3*S);
    // hammer head
    tc.fillStyle = '#aaa';
    tc.fillRect(hamX - S*(dir>0?0:1), hamY - S, S*2, S);
    tc.fillRect(hamX - S*(dir>0?0:1), hamY - 2*S, S*2, S);
  } else {
    // coffee cup in hand
    const cupX = dir>=0 ? px+2*S : px-4*S;
    const cupY = py+4*S;
    // arm holding cup
    tc.fillStyle = w.color;
    tc.fillRect(cupX, cupY, S, 2*S);
    // cup
    tc.fillStyle = '#ffffff';
    tc.fillRect(cupX-S, cupY+2*S, 3*S, 3*S);
    tc.fillStyle = '#6a3a10';
    tc.fillRect(cupX-S+1, cupY+2*S+1, 3*S-2, S);
    // steam
    tc.fillStyle = 'rgba(255,255,255,0.4)';
    const steamOff = Math.sin(t*0.003+w.hammerPhase)*S;
    tc.fillRect(cupX+steamOff, cupY-S, 1, S);
    tc.fillRect(cupX+S+steamOff, cupY-2*S, 1, S);
  }
}

function towerFrame(ts){
  if(towerState.prevT===null) towerState.prevT=ts;
  const dt = Math.min(ts - towerState.prevT, 80);
  towerState.prevT = ts;

  const CW = towerCanvas.width;
  const CH = towerCanvas.height;
  const groundY = CH - GROUND_H;
  const floorW = Math.floor(CW * FLOOR_W_RATIO);
  const floorX = Math.floor((CW - floorW)/2);

  // advance build progress
  if(!towerState.paused){
    const floorTimeSec = FLOOR_TIMES[intensity-1];
    const progressPerMs = 1 / (floorTimeSec * 1000);
    towerState.buildProgress += progressPerMs * dt;

    if(towerState.buildProgress >= 1){
      towerState.buildProgress = 0;
      towerState.floors.push({});
      towerState.currentFloor++;
      // each time a floor completes, workers get new positions
      initWorkers();
    }
  }

  // Camera: keep the active floor (the one being built) centred vertically in the canvas.
  // The active floor's top surface is at: vGroundY - activeLevelTop
  // where activeLevelTop = (floors.length + buildProgress) * FLOOR_H (measured upward from vGroundY).
  // We want that surface to sit at CH/2 on screen:
  //   vGroundY - activeLevelTop = CH/2
  //   groundY + scrollOffset - activeLevelTop = CH/2
  //   scrollOffset = CH/2 - groundY + activeLevelTop
  const activeLevelTop = (towerState.floors.length + towerState.buildProgress) * FLOOR_H;
  const targetOffset = activeLevelTop - (CH / 2 - GROUND_H);
  // Only start scrolling once the tower is tall enough to need it
  const clampedTarget = Math.max(0, targetOffset);
  towerState.scrollOffset += (clampedTarget - towerState.scrollOffset) * 0.06;
  const vGroundY = groundY + towerState.scrollOffset;

  // draw
  drawSky(CW, CH);

  // draw completed floors (stacked upward from vGroundY)
  for(let i=0;i<towerState.floors.length;i++){
    const pal = makeFloorPal(i);
    const fy = vGroundY - (i+1)*FLOOR_H;
    if(fy > CH || fy + FLOOR_H < 0) continue;
    drawFloor(floorX, fy, floorW, FLOOR_H, pal, 1);
  }

  // draw current floor being built
  if(towerState.buildProgress > 0){
    const pal = makeFloorPal(towerState.floors.length);
    const fy = vGroundY - (towerState.floors.length+1)*FLOOR_H;
    drawFloor(floorX, fy, floorW, FLOOR_H, pal, towerState.buildProgress);
  }

  // draw ground
  drawGround(CW, CH);

  // Surface Y: top of the current active floor (completed floors + partial progress), measured downward on screen
  const surfaceY = vGroundY - (towerState.floors.length * FLOOR_H) - (towerState.buildProgress * FLOOR_H);

  // draw scaffold (vertical lines on sides of building)
  if(towerState.floors.length > 0 || towerState.buildProgress > 0){
    tc.strokeStyle = 'rgba(120,100,60,0.4)';
    tc.lineWidth = 1.5;
    tc.setLineDash([4,4]);
    tc.beginPath();tc.moveTo(floorX, Math.min(vGroundY, CH));tc.lineTo(floorX, surfaceY - 10);tc.stroke();
    tc.beginPath();tc.moveTo(floorX+floorW, Math.min(vGroundY, CH));tc.lineTo(floorX+floorW, surfaceY - 10);tc.stroke();
    tc.setLineDash([]);
  }
  // Sprite: py is top of worker. Feet are at py + 13*S (S=2), so shift up so feet = surfaceY
  const workerY = surfaceY - 13 * 2;
  const coffeeBreak = towerState.paused;
  const speed = WORKER_SPEEDS[intensity-1];

  for(const w of towerState.workers){
    if(!coffeeBreak){
      // move worker
      w.x += w.dir * speed * (dt/16);
      if(w.x > floorX + floorW - 6) { w.x = floorX + floorW - 6; w.dir = -1; }
      if(w.x < floorX + 6) { w.x = floorX + 6; w.dir = 1; }
    } else {
      // coffee break: drift to their seat
      if(!w.coffeeSeatSet){
        w.coffeeSeatX = floorX + floorW * (0.2 + Math.random()*0.6);
        w.coffeeSeatSet = true;
      }
      w.x += (w.coffeeSeatX - w.x) * 0.08;
      w.dir = w.coffeeSeatX > w.x ? 1 : -1;
    }
    drawWorker(w, w.x, workerY, ts, coffeeBreak);
  }

  // floor progress bar (thin strip at the current build surface)
  if(!towerState.paused && towerState.buildProgress > 0){
    const barY = surfaceY - 3;
    tc.fillStyle = 'rgba(0,0,0,0.4)';
    tc.fillRect(floorX, barY, floorW, 3);
    tc.fillStyle = col();
    tc.fillRect(floorX, barY, Math.floor(floorW * towerState.buildProgress), 3);
  }

  // paused indicator
  if(towerState.paused && (towerState.floors.length > 0 || towerState.buildProgress > 0)){
    tc.fillStyle = 'rgba(255,255,255,0.06)';
    tc.fillRect(0, 0, CW, CH);
    tc.font = 'bold 9px monospace';
    tc.fillStyle = 'rgba(255,255,255,0.25)';
    tc.letterSpacing = '3px';
    tc.textAlign = 'center';
    tc.fillText('COFFEE BREAK', CW/2, 18);
    tc.letterSpacing = '0px';
  }

  towerState.rafId = requestAnimationFrame(towerFrame);
}

function startTower(){
  if(towerState.rafId){ cancelAnimationFrame(towerState.rafId); towerState.rafId=null; }
  towerState.prevT = null;
  if(towerState.workers.length===0) initWorkers();
  towerState.rafId = requestAnimationFrame(towerFrame);
}

function stopTower(){
  if(towerState.rafId){ cancelAnimationFrame(towerState.rafId); towerState.rafId=null; }
}

function resizeTower(){
  const w = Math.round(towerCanvas.getBoundingClientRect().width);
  if(w>0 && towerCanvas.width!==w){ towerCanvas.width=w; }
}
window.addEventListener('resize', resizeTower);
setTimeout(resizeTower, 50);

// init render loop always so we can see the idle canvas
resetTower();
towerState.paused = true;
startTower();
</script>
