<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADHD GO</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0c0c10;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  font-family:'Nunito',sans-serif;
  color:#e0e0e8;
}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.scene{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:0;}

.city-window{
  width:480px;border-radius:10px 10px 0 0;overflow:hidden;
  border:2px solid #2e2e42;border-bottom:none;
  opacity:0;transition:opacity 0.8s ease;
}
.city-window.on{opacity:1;}
.window-bar{
  background:#22223a;padding:7px 12px;
  display:flex;align-items:center;gap:7px;
  border-bottom:1px solid #2e2e42;
}
.dot{width:10px;height:10px;border-radius:50%;}
.dot-r{background:#e24b4a;}.dot-y{background:#f0c040;}.dot-g{background:#3a9e5a;}
.win-title{
  flex:1;text-align:center;font-size:10px;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;color:#404060;
  margin-right:34px;
}
#city{display:block;width:480px;height:160px;image-rendering:pixelated;}

.btn-stage{position:relative;width:210px;height:210px;display:flex;align-items:center;justify-content:center;margin-top:-8px;}
.ring{position:absolute;border-radius:50%;border:2.5px solid transparent;pointer-events:none;opacity:0;transition:border-color .4s,opacity .4s;}
#r1{inset:-14px;}
#r2{inset:-28px;border-width:1.5px;}

@keyframes rp {0%,100%{opacity:.55;transform:scale(1)}50%{opacity:1;transform:scale(1.07)}}
@keyframes rp2{0%,100%{opacity:.18;transform:scale(1)}50%{opacity:.5;transform:scale(1.12)}}
@keyframes bs {0%,100%{transform:scale(1)}50%{transform:scale(1.042)}}
@keyframes bm {0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes bf {0%,100%{transform:scale(1)}40%{transform:scale(1.10)}55%{transform:scale(1.13)}}

.ps #r1{animation:rp  2.5s ease-in-out infinite;opacity:.55;}
.ps #r2{animation:rp2 2.5s ease-in-out infinite .7s;opacity:.18;}
.ps #btn{animation:bs 2.5s ease-in-out infinite;}
.pm #r1{animation:rp  1.4s ease-in-out infinite;opacity:.65;}
.pm #r2{animation:rp2 1.4s ease-in-out infinite .35s;opacity:.28;}
.pm #btn{animation:bm 1.4s ease-in-out infinite;}
.pf #r1{animation:rp  .68s ease-in-out infinite;opacity:.85;}
.pf #r2{animation:rp2 .68s ease-in-out infinite .17s;opacity:.4;}
.pf #btn{animation:bf .68s ease-in-out infinite;}

#btn{
  width:190px;height:190px;border-radius:50%;border:none;cursor:pointer;
  font-family:'Boogaloo',cursive;font-size:2.4rem;letter-spacing:.07em;
  color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.5);
  background:#e24b4a;z-index:3;
  transition:background .4s,box-shadow .4s,transform .1s;
  outline:none;user-select:none;-webkit-tap-highlight-color:transparent;
  box-shadow:0 6px 38px rgba(226,75,74,.5);
}
#btn:hover{transform:scale(1.035)!important;}
#btn:active{transform:scale(.93)!important;}

.controls{margin-top:22px;display:flex;flex-direction:column;align-items:center;gap:10px;width:320px;}
.ctrl-row{display:flex;justify-content:space-between;align-items:center;width:100%;}
.lbl{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#505060;}
.vibe{font-size:13px;font-weight:900;transition:color .3s;}
input[type=range]{
  -webkit-appearance:none;appearance:none;
  width:100%;height:5px;border-radius:3px;
  background:#1e1e28;outline:none;cursor:pointer;transition:background .3s;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:20px;height:20px;border-radius:50%;
  background:#e24b4a;border:3px solid #0c0c10;
  cursor:pointer;transition:background .3s,transform .15s;
}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.2);}
.ticks{display:flex;justify-content:space-between;width:100%;}
.ticks span{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#333344;}
.pause-row{
  display:flex;align-items:center;gap:12px;width:100%;margin-top:4px;
}
.gauge-wrap{flex:1;display:flex;flex-direction:column;gap:6px;}
.gauge-top{display:flex;justify-content:space-between;align-items:baseline;}
.gauge-lbl{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#505060;}
.gauge-count{font-size:14px;font-weight:900;transition:color .4s;color:#444458;}
.gauge-track{width:100%;height:7px;background:#1a1a24;border-radius:4px;overflow:hidden;}
.gauge-fill{height:100%;width:0%;border-radius:4px;transition:width .5s ease,background .5s ease;background:#eeeef4;}
.reset-btn{
  background:none;border:1px solid #2a2a38;border-radius:8px;
  color:#505060;font-family:'Nunito',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;padding:7px 14px;cursor:pointer;
  white-space:nowrap;transition:border-color .2s,color .2s,background .2s;
}
.reset-btn:hover{border-color:#444;color:#e0e0e8;background:#1a1a24;}
.hint{margin-top:14px;font-size:11px;color:#404050;letter-spacing:.1em;text-transform:uppercase;font-weight:700;text-align:center;}
#btn.locked{cursor:not-allowed;filter:grayscale(.7);}
#btn.locked:hover{transform:none!important;}
#btn.locked:active{transform:none!important;}
.max-msg{
  margin-top:10px;font-size:12px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;
  color:#e24b4a;text-align:center;
  animation:flash-msg 1s ease-in-out 3;
}
@keyframes flash-msg{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="scene">
  <div class="city-window" id="city-window">
    <div class="window-bar">
      <div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>
      <span class="win-title">Builder View</span>
    </div>
    <canvas id="city" width="480" height="160"></canvas>
  </div>
  <div class="btn-stage" id="stage">
    <div class="ring" id="r1"></div>
    <div class="ring" id="r2"></div>
    <button id="btn">START</button>
  </div>
  <div class="controls">
    <div class="ctrl-row">
      <span class="lbl">Motivation Intensity</span>
      <span class="vibe" id="vibe">Gentle nudge</span>
    </div>
    <input type="range" id="slider" min="1" max="5" step="1" value="1">
    <div class="ticks">
      <span>Soft</span><span>Mild</span><span>Medium</span><span>Fired</span><span>CHAOS</span>
    </div>
  </div>
  <div class="pause-row">
    <div class="gauge-wrap">
      <div class="gauge-top">
        <span class="gauge-lbl">Pauses today</span>
        <span class="gauge-count" id="pause-count">0</span>
      </div>
      <div class="gauge-track">
        <div class="gauge-fill" id="gauge-fill"></div>
      </div>
    </div>
    <button class="reset-btn" id="reset-btn">Reset</button>
  </div>
  <p class="hint" id="hint">click to start &nbsp;·&nbsp; double-click to pause</p>
  <p class="max-msg" id="max-msg" style="display:none"></p>
</div>

<script>
// ── stars ──
(()=>{
  const c=document.getElementById('stars'),x=c.getContext('2d');
  c.width=window.innerWidth;c.height=window.innerHeight;
  for(let i=0;i<200;i++){
    const px=Math.random()*c.width,py=Math.random()*c.height,r=Math.random()*1.3;
    x.beginPath();x.arc(px,py,r,0,Math.PI*2);
    x.fillStyle=`rgba(255,255,255,${.08+Math.random()*.35})`;x.fill();
  }
})();

// ── state ──
const COLORS=['#e24b4a','#d85a30','#ba7517','#5a9620','#1a9e72','#1660a8','#7a70de','#cc4e80','#2e8a5a','#0a447e','#8b3fc0','#a8602a'];
const VIBES=['Gentle nudge','Getting real','Fired up','Full send','CHAOS MODE'];
let running=false, colorIdx=0, intensity=1, clickTimer=null, pauseCount=0;
const MAX_PAUSES=5;

const btn=document.getElementById('btn');
const stage=document.getElementById('stage');
const r1=document.getElementById('r1');
const r2=document.getElementById('r2');
const slider=document.getElementById('slider');
const vibeEl=document.getElementById('vibe');
const hint=document.getElementById('hint');
const maxMsg=document.getElementById('max-msg');
const cityEl=document.getElementById('city');
const cityWindow=document.getElementById('city-window');
const pauseCountEl=document.getElementById('pause-count');
const gaugeFill=document.getElementById('gauge-fill');
const resetBtn=document.getElementById('reset-btn');

function col(){return COLORS[colorIdx%COLORS.length];}

function applyColor(c){
  btn.style.background=c;
  btn.style.boxShadow=`0 6px 38px ${c}77`;
  r1.style.borderColor=c+'bb';
  r2.style.borderColor=c+'55';
  vibeEl.style.color=c;
  const pct=((intensity-1)/4*100).toFixed(0);
  slider.style.background=`linear-gradient(to right,${c} 0%,${c} ${pct}%,#1e1e28 ${pct}%,#1e1e28 100%)`;
  let st=document.getElementById('_th');
  if(!st){st=document.createElement('style');st.id='_th';document.head.appendChild(st);}
  st.textContent=`input[type=range]::-webkit-slider-thumb{background:${c}!important;}`;
}

function setPulse(){
  stage.className='btn-stage';
  if(!running) return;
  if(intensity<=2) stage.classList.add('ps');
  else if(intensity<=4) stage.classList.add('pm');
  else stage.classList.add('pf');
}

function goRunning(){
  if(pauseCount>=MAX_PAUSES) return;
  running=true;
  colorIdx++;
  applyColor(col());
  setPulse();
  btn.textContent='STARTING';
  hint.textContent='click to change color · double-click to pause';
  cityWindow.classList.add('on');
  startCity();
  setTimeout(()=>{ if(running) btn.textContent='GO!'; },700);
}

function updateGauge(){
  const t=Math.min(pauseCount/MAX_PAUSES,1);
  gaugeFill.style.width=(t*100)+'%';
  pauseCountEl.textContent=pauseCount;
  let r,g,b;
  if(t<.5){const s=t*2; r=Math.round(238+s*(210-238)); g=Math.round(238+s*(90-238)); b=Math.round(238+s*(50-238));}
  else{const s=(t-.5)*2; r=Math.round(210+s*(60-210)); g=Math.round(90+s*(10-90)); b=Math.round(50+s*(10-50));}
  const c=`rgb(${r},${g},${b})`;
  gaugeFill.style.background=c;
  pauseCountEl.style.color=t<.05?'#444458':c;
  if(pauseCount>=MAX_PAUSES){
    btn.classList.add('locked');
    btn.textContent='LOCKED';
    btn.style.background='#3a3a4a';
    btn.style.boxShadow='0 6px 38px rgba(0,0,0,.3)';
    hint.textContent='';
    maxMsg.textContent='max pauses hit — reset to continue';
    maxMsg.style.display='block';
    // re-trigger flash animation
    maxMsg.style.animation='none';
    maxMsg.offsetHeight;
    maxMsg.style.animation='flash-msg 1s ease-in-out 3';
  }
}

function goPause(){
  running=false;
  pauseCount=Math.min(pauseCount+1,MAX_PAUSES);
  updateGauge();
  stopCity();
  stage.className='btn-stage';
  cityWindow.classList.remove('on');
  if(pauseCount>=MAX_PAUSES) return; // locked state handled by updateGauge
  btn.style.background='#e24b4a';
  btn.style.boxShadow='0 6px 38px rgba(226,75,74,.5)';
  r1.style.borderColor='#e24b4abb';
  r2.style.borderColor='#e24b4a44';
  btn.textContent='PAUSE';
  hint.textContent='paused · click to go again';
  setTimeout(()=>{ if(!running&&pauseCount<MAX_PAUSES) btn.textContent='START'; },1300);
}

// single vs double click — first click starts 300ms timer
// second click within 300ms cancels timer and triggers double-click action
btn.addEventListener('click',()=>{
  if(clickTimer!==null){
    clearTimeout(clickTimer);
    clickTimer=null;
    goPause();
  } else {
    clickTimer=setTimeout(()=>{
      clickTimer=null;
      goRunning();
    },300);
  }
});

slider.addEventListener('input',()=>{
  intensity=parseInt(slider.value);
  vibeEl.textContent=VIBES[intensity-1];
  applyColor(running?col():'#e24b4a');
  if(running) setPulse();
});

resetBtn.addEventListener('click',()=>{
  pauseCount=0;
  updateGauge();
  btn.classList.remove('locked');
  btn.textContent='START';
  btn.style.background='#e24b4a';
  btn.style.boxShadow='0 6px 38px rgba(226,75,74,.5)';
  r1.style.borderColor='#e24b4abb';
  r2.style.borderColor='#e24b4a44';
  maxMsg.style.display='none';
  hint.textContent='click to start · double-click to pause';
});

applyColor('#e24b4a');
updateGauge();

// ── ISO CITY ──
const cv=cityEl, cx=cv.getContext('2d');
const CW=480, CH=160;
const TW=22, TH=11;

function isoX(gx,gy){ return CW/2+(gx-gy)*(TW/2); }
function isoY(gx,gy,gz){ return CH-50+(gx+gy)*(TH/2)-gz*TH; }

const BPAL=[
  {top:'#3d6a8a',lft:'#28506a',rgt:'#1a3548'},
  {top:'#6a5a8a',lft:'#4e4268',rgt:'#34294a'},
  {top:'#3a8a62',lft:'#27684a',rgt:'#184530'},
  {top:'#8a6840',lft:'#68502e',rgt:'#4a381e'},
  {top:'#8a4040',lft:'#682e2e',rgt:'#4a1e1e'},
  {top:'#3a7a8a',lft:'#285c68',rgt:'#1a3e48'},
  {top:'#7a7a3a',lft:'#5c5c28',rgt:'#3e3e18'},
  {top:'#8a4a6a',lft:'#683450',rgt:'#4a2236'},
];

const GRID_D=4;
let worldX=0;
let columns=[];
let rafId=null;
let prevT=null;

// Build speeds per intensity — very slow at level 1
const SCROLL_SPEEDS=[.002,.005,.009,.016,.027];
const BUILD_RATES  =[.004,.009,.018,.030,.052];

function makeColumn(gx){
  const buildings=[];
  for(let y=0;y<GRID_D;y++){
    if(Math.random()<.62){
      buildings.push({
        gy:y, h:1+Math.floor(Math.random()*6),
        built:0, pal:BPAL[Math.floor(Math.random()*BPAL.length)]
      });
    }
  }
  return {gx, buildings};
}

function ensureColumns(){
  // pre-fill right side
  const need=Math.floor(worldX)+26;
  while(true){
    const rgt=columns.length>0 ? columns[columns.length-1].gx : Math.floor(worldX)-1;
    if(rgt<need) columns.push(makeColumn(rgt+1));
    else break;
  }
  // prune far left
  while(columns.length>0 && columns[0].gx < Math.floor(worldX)-4){
    columns.shift();
  }
}

function drawBlock(gx,gy,gz,pal,alpha){
  const sx=isoX(gx-worldX,gy);
  const sy=isoY(gx-worldX,gy,gz);
  if(sx<-TW*2||sx>CW+TW*2) return;
  cx.globalAlpha=alpha;
  // top face
  cx.beginPath();
  cx.moveTo(sx,sy); cx.lineTo(sx+TW/2,sy+TH/2);
  cx.lineTo(sx+TW,sy); cx.lineTo(sx+TW/2,sy-TH/2);
  cx.closePath(); cx.fillStyle=pal.top; cx.fill();
  // left face
  cx.beginPath();
  cx.moveTo(sx,sy); cx.lineTo(sx,sy+TH);
  cx.lineTo(sx+TW/2,sy+TH+TH/2); cx.lineTo(sx+TW/2,sy+TH/2);
  cx.closePath(); cx.fillStyle=pal.lft; cx.fill();
  // right face
  cx.beginPath();
  cx.moveTo(sx+TW,sy); cx.lineTo(sx+TW,sy+TH);
  cx.lineTo(sx+TW/2,sy+TH+TH/2); cx.lineTo(sx+TW/2,sy+TH/2);
  cx.closePath(); cx.fillStyle=pal.rgt; cx.fill();
  // window
  if(gz>0 && Math.random()<.06){
    cx.fillStyle='rgba(255,240,130,.75)';
    cx.fillRect(sx+TW/2-3,sy-3,3,3);
  }
  cx.strokeStyle='rgba(0,0,0,.18)'; cx.lineWidth=.4;
  cx.beginPath();
  cx.moveTo(sx,sy); cx.lineTo(sx+TW/2,sy-TH/2); cx.lineTo(sx+TW,sy);
  cx.lineTo(sx+TW/2,sy+TH/2); cx.closePath(); cx.stroke();
  cx.globalAlpha=1;
}

function drawBuilder(gx,gy,topZ,t){
  const sx=isoX(gx-worldX,gy);
  const sy=isoY(gx-worldX,gy,topZ);
  if(sx<-30||sx>CW+30) return;
  const bob=Math.sin(t*.003+gy*1.3)*1.8;
  const px=sx-3, py=sy-16+bob;
  cx.fillStyle='#f0c040'; cx.fillRect(px,py,7,3);       // hat
  cx.fillStyle='#f5c9a0'; cx.fillRect(px+1,py+3,5,4);   // head
  cx.fillStyle='#3a6ee0'; cx.fillRect(px,py+7,7,5);      // body
  cx.fillStyle='#22223a'; cx.fillRect(px,py+12,3,4);     // legs
                           cx.fillRect(px+4,py+12,3,4);
  cx.fillStyle='#cccccc';                                  // tool
  if(Math.sin(t*.007+gx)>0) cx.fillRect(px+8,py+3,2,6);
  else                        cx.fillRect(px+8,py+7,2,6);
}

function cityFrame(t){
  if(prevT===null) prevT=t;
  const dt=Math.min(t-prevT,60);
  prevT=t;

  const spd=SCROLL_SPEEDS[intensity-1];
  const brt=BUILD_RATES[intensity-1];

  worldX+=spd*(dt/16);
  ensureColumns();

  cx.clearRect(0,0,CW,CH);
  cx.fillStyle='#13132a'; cx.fillRect(0,0,CW,CH);

  // ground
  for(let xi=Math.floor(worldX)-1;xi<Math.floor(worldX)+25;xi++){
    for(let yi=0;yi<GRID_D;yi++){
      const sx=isoX(xi-worldX,yi), sy=isoY(xi-worldX,yi,0);
      cx.beginPath();
      cx.moveTo(sx,sy); cx.lineTo(sx+TW/2,sy+TH/2);
      cx.lineTo(sx+TW,sy); cx.lineTo(sx+TW/2,sy-TH/2);
      cx.closePath();
      cx.fillStyle=(xi+yi)%2===0?'#1e1e3a':'#191932'; cx.fill();
      cx.strokeStyle='rgba(120,120,200,.07)'; cx.lineWidth=.4; cx.stroke();
    }
  }

  // collect + painter-sort
  const all=[];
  for(const col of columns)
    for(const b of col.buildings)
      all.push({gx:col.gx, b});
  all.sort((a,b2)=>(a.gx+a.b.gy)-(b2.gx+b2.b.gy));

  // draw buildings
  for(const {gx,b} of all){
    if(b.built<b.h) b.built=Math.min(b.built+brt*(dt/16), b.h);
    const layers=Math.floor(b.built);
    for(let z=0;z<layers;z++) drawBlock(gx,b.gy,z,b.pal,1);
    const frac=b.built-layers;
    if(frac>.04&&layers<b.h) drawBlock(gx,b.gy,layers,b.pal,frac);
  }

  // draw builders on top
  for(const {gx,b} of all){
    if(b.built>=.9) drawBuilder(gx,b.gy,Math.floor(b.built),t);
  }

  // always re-request — running flag checked to decide whether to stop AFTER draw
  if(running){
    rafId=requestAnimationFrame(cityFrame);
  }
}

function startCity(){
  prevT=null;
  if(rafId){ cancelAnimationFrame(rafId); rafId=null; }
  rafId=requestAnimationFrame(cityFrame);
}

function stopCity(){
  if(rafId){ cancelAnimationFrame(rafId); rafId=null; }
}

// pre-populate columns so city is ready instantly
ensureColumns();
</script>
</body>
</html>
